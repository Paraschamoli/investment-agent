id: investment-agent-v1
name: investment-agent
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  AI investment agent that researches stock prices, analyst recommendations, and stock fundamentals using YFinance data.
  Uses OpenRouter LLM (default: openai/gpt-4o) with YFinanceTools for market data retrieval.

# Tags and Modes
tags:
  - investment
  - stock-analysis
  - yfinance
  - financial-data

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/markdown

# Example Queries
examples:
  - "Analyze Apple (AAPL) stock and provide investment recommendation"
  - "Compare Microsoft vs Google stock performance"
  - "What are the key fundamentals for Tesla stock?"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Stock analysis using YFinance data"
    features:
      - "Stock price data retrieval via YFinanceTools"
      - "Analyst recommendations via YFinanceTools"
      - "Stock fundamentals via YFinanceTools"
      - "Markdown-formatted responses with tables"
      - "Multi-stock comparison analysis"
    limitations: "Limited to YFinanceTools capabilities; depends on YFinance API availability; requires OpenRouter API key"

  secondary_capability:
    supported: false
    description: "Not supported by code"
    features: []

# Requirements
requirements:
  packages:
    - agno>=2.2.0
    - bindu
    - yfinance>=0.2.18
    - python-dotenv>=1.0.1
  system:
    - "Internet access for YFinance API"
  min_memory_mb: 256
  external_services:
    - YFinance API
    - OpenRouter API

# Performance Metrics
performance:
  avg_processing_time_ms: null
  avg_time_per_stock_ms: null
  max_concurrent_requests: null
  memory_per_request_mb: null
  timeout_seconds: null
  max_stocks_per_query: null
  scalability: null

# Tool Restrictions
allowed_tools:
  - YFinanceTools

# Rich Documentation
documentation:
  overview: |
    Investment agent using YFinanceTools for stock data retrieval.
    Powered by OpenRouter LLM (configurable model, default: openai/gpt-4o).
    Returns markdown-formatted analysis with tables.

  use_cases:
    when_to_use:
      - "Stock price and fundamental data queries"
      - "Analyst recommendation lookups"
      - "Stock comparison requests"
      - "Investment analysis questions answerable via YFinance data"

    when_not_to_use:
      - "Real-time trading execution"
      - "Data sources other than YFinance"
      - "Cryptocurrency analysis (unless YFinance supports it)"
      - "Options or derivatives (unless YFinance supports it)"
      - "Portfolio tracking or management (not implemented)"
      - "Technical indicators beyond YFinance data"

  input_structure: |
    Accepts natural language text or JSON messages:

    Text: "Analyze AAPL stock"

    JSON (message format):
    [{"role": "user", "content": "Compare AAPL and MSFT"}]

    No specific schema enforced; agent interprets natural language queries.

  output_format: |
    Markdown-formatted text with tables where applicable.

    Example structure (agent-generated, not hardcoded):
    - Stock overview
    - Price analysis
    - Fundamental metrics (P/E, market cap, etc.)
    - Analyst recommendations
    - Investment insights

    Actual format depends on LLM response and agent instructions.

  error_handling:
    - "Missing OPENROUTER_API_KEY: Raises ValueError at initialization"
    - "Agent not initialized: Raises RuntimeError"
    - "YFinance API errors: Propagated from YFinanceTools"
    - "Invalid stock symbols: Handled by YFinanceTools/LLM"

  examples:
    - title: "Single Stock Analysis"
      input:
        query: "Analyze NVDA stock comprehensively"
      output:
        format: "Markdown with sections for price, fundamentals, recommendations, outlook"

    - title: "Stock Comparison"
      input:
        query: "Compare AAPL, MSFT, and AMZN"
      output:
        format: "Markdown with comparison tables and strategic commentary"

  best_practices:
    for_developers:
      - "Set OPENROUTER_API_KEY environment variable"
      - "Optionally set MODEL_NAME (default: openai/gpt-4o)"
      - "Agent initializes lazily on first request"
      - "Uses async handler pattern"

    for_orchestrators:
      - "Route YFinance-based stock queries here"
      - "Expect markdown output only"
      - "Agent uses debug_mode=True (verbose logging)"
      - "No built-in caching beyond model-level cache_response=True"

  installation: |
    Required packages:
    pip install agno bindu yfinance python-dotenv

    Environment variables:
    OPENROUTER_API_KEY (required)
    MODEL_NAME (optional, default: openai/gpt-4o)

  versioning:
    - version: "1.0.0"
      date: "2026-03-03"
      changes: "Initial implementation with YFinanceTools and OpenRouter"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - investment
    - stock
    - yfinance
    - analyst
    - recommendation
    - fundamental
    - price
    - market cap
    - P/E ratio
    - ticker
    - AAPL
    - MSFT
    - NVDA

  specializations:
    - domain: yfinance_data
      confidence_boost: 0.4
    - domain: stock_fundamentals
      confidence_boost: 0.3
    - domain: analyst_recommendations
      confidence_boost: 0.3

  anti_patterns:
    - "real-time trading"
    - "portfolio management"
    - "tax advice"
    - "legal advice"
    - "guaranteed returns"
    - "non-yfinance data sources"

  complexity_indicators:
    simple:
      - "stock price"
      - "current price"
      - "ticker info"
    medium:
      - "analyze stock"
      - "fundamentals"
      - "analyst recommendations"
    complex:
      - "compare multiple stocks"
      - "comprehensive analysis"
      - "investment outlook"
